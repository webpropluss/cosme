<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LUA · Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --paper:#FFFFFF;--cream:#F4F5FA;--cream2:#EEF0F6;
    --brown:#1F2430;--ink:#3A4151;--inkSoft:#6B7280;
    --taupe:#C7CBD6;--taupe-d:#5B57E0;--gold:#5B57E0;--espresso:#10162A;
    --line:#E6E8F0;--green:#16A34A;--yellow:#E0922F;--blue:#5B57E0;--gray:#7C8698;--red:#DC2626;
    --display:'Inter',system-ui,sans-serif;--ui:'Inter',system-ui,sans-serif;--brand:'Cormorant Garamond',Georgia,serif;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--cream);color:var(--ink);font-family:var(--ui);font-weight:400;font-size:15px;-webkit-font-smoothing:antialiased;}
  h1,h2,h3{font-family:var(--display);font-weight:700;color:var(--brown);margin:0;font-style:normal;}
  button{font-family:var(--ui);cursor:pointer;}
  input,select,textarea{font-family:var(--ui);font-size:14px;color:var(--brown);border:1px solid var(--line);border-radius:10px;background:#fff;padding:10px 12px;width:100%;}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--taupe-d);box-shadow:0 0 0 3px rgba(91,87,224,.12);}
  .label{font-family:var(--ui);font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--inkSoft);font-weight:600;}
  .btn{display:inline-flex;align-items:center;gap:8px;justify-content:center;border:1px solid var(--taupe-d);background:var(--taupe-d);color:#fff;border-radius:10px;padding:11px 18px;font-size:13.5px;font-weight:600;letter-spacing:.01em;box-shadow:0 1px 2px rgba(91,87,224,.25);}
  .btn:hover{background:#4a46c7;border-color:#4a46c7;}
  .btn.ghost{background:#fff;color:var(--brown);border-color:var(--line);box-shadow:none;}
  .btn.ghost:hover{background:#F7F8FB;}
  .btn.sm{padding:7px 12px;font-size:12px;border-radius:8px;}
  .btn:disabled{opacity:.5;cursor:not-allowed;}

  .center-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:22px;background:var(--cream);}
  .card{background:#fff;border:1px solid var(--line);border-radius:18px;padding:32px;width:400px;max-width:100%;box-shadow:0 10px 40px -12px rgba(16,24,40,.18);}
  .card h2{font-size:26px;font-style:normal;margin-bottom:4px;}
  .fld{margin-bottom:14px;}
  .fld label{display:block;font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--inkSoft);font-weight:600;margin-bottom:6px;}
  .err{color:var(--red);font-size:13px;margin:6px 0 0;}
  .auth-link{background:none;border:none;color:var(--taupe-d);font-size:13px;cursor:pointer;font-family:var(--ui);font-weight:500;text-decoration:none;padding:0;}
  .auth-link:hover{text-decoration:underline;}
  .mono{font-family:ui-monospace,monospace;font-size:12px;background:#F7F8FB;border:1px solid var(--line);border-radius:8px;padding:8px 10px;word-break:break-all;}

  .topbar{display:none;}
  .backdrop{display:none;}
  .shell{display:grid;grid-template-columns:230px 1fr;min-height:100vh;}
  .side{background:var(--espresso);color:#A9B2C9;padding:20px 14px;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow:auto;}
  .side .lg{font-family:var(--brand);font-weight:600;font-size:26px;letter-spacing:.22em;color:#fff;padding-left:10px;margin:6px 0 26px;}
  .side a{display:flex;align-items:center;gap:12px;color:#A9B2C9;border:none;background:transparent;border-radius:10px;padding:11px 12px;font-size:14.5px;font-weight:500;text-align:left;margin-bottom:4px;cursor:pointer;}
  .side a svg{width:18px;height:18px;flex:none;opacity:.9;}
  .side a.on{background:var(--taupe-d);color:#fff;box-shadow:0 6px 16px -6px rgba(91,87,224,.8);}
  .side a:not(.on):hover{background:rgba(255,255,255,.06);color:#fff;}
  .side .out{margin-top:auto;color:#7E889E;font-size:14px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:12px;padding:11px 12px;border:none;background:transparent;text-align:left;}
  .side .out svg{width:18px;height:18px;}
  .side .out:hover{color:#fff;}
  .main{padding:26px 30px 60px;overflow:auto;min-width:0;}
  @media(max-width:760px){
    .topbar{display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:60;background:var(--espresso);color:#fff;padding:12px 16px;}
    .burger{background:none;border:none;color:#fff;font-size:22px;line-height:1;cursor:pointer;padding:2px 6px;}
    .tb-lg{font-family:var(--brand);font-weight:600;font-size:22px;letter-spacing:.2em;}
    .shell{grid-template-columns:1fr;}
    .side{position:fixed;top:0;left:0;bottom:0;width:236px;max-width:82vw;z-index:80;height:auto;transform:translateX(-100%);transition:transform .25s ease;}
    .side.open{transform:none;}
    .backdrop{display:block;position:fixed;inset:0;background:rgba(16,22,42,.5);z-index:70;opacity:0;pointer-events:none;transition:opacity .25s;}
    .backdrop.open{opacity:1;pointer-events:auto;}
    .main{padding:18px 16px 64px;}
  }

  .head{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:20px;}
  .head h2{font-size:26px;font-style:normal;}
  .datenav{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
  .datenav input[type=date]{width:auto;}
  .navbtn{width:38px;height:38px;border-radius:10px;border:1px solid var(--line);background:#fff;font-size:18px;color:var(--brown);}
  .navbtn:hover{background:#F7F8FB;}
  .tools{display:flex;gap:8px;margin:4px 0 16px;flex-wrap:wrap;}
  .tools button{font-size:12px;font-weight:600;border:1px solid var(--line);background:#fff;border-radius:9px;padding:9px 14px;color:var(--brown);}
  .tools button:hover{background:#F7F8FB;}
  .summary{font-size:14px;color:var(--ink);margin-bottom:8px;}
  .legend{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:18px;}
  .legend span{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;color:var(--ink);}
  .legend i{width:10px;height:10px;border-radius:50%;}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(158px,1fr));gap:12px;}
  .slot{border:1px solid var(--line);border-radius:14px;padding:14px;background:#fff;box-shadow:0 1px 2px rgba(16,24,40,.04);}
  .slot .t{font-family:var(--display);font-weight:700;font-size:21px;color:var(--brown);line-height:1;}
  .chip{display:inline-block;font-size:10px;letter-spacing:.06em;text-transform:uppercase;border-radius:99px;padding:3px 9px;margin-top:8px;font-weight:700;}
  .chip-available{background:#E5F5EC;color:#1E7C44;}
  .chip-pending{background:#FCEFD9;color:#B36A12;}
  .chip-reserved{background:#EAE9FB;color:#4A46C7;}
  .chip-attended{background:#EEF0F4;color:#5B6577;}
  .chip-closed{background:#EEF0F4;color:#8A93A3;}
  .chip-cancelled{background:#FBE9E9;color:#C0392B;}
  .slot .who{font-size:12px;color:var(--inkSoft);margin-top:7px;min-height:1.1em;line-height:1.3;}
  .slot .row{display:flex;gap:6px;margin-top:11px;flex-wrap:wrap;}
  .slot .row button{font-size:11.5px;font-weight:600;letter-spacing:.02em;border-radius:8px;padding:7px 11px;border:1px solid var(--line);background:#fff;color:var(--brown);}
  .slot .row button:hover{background:#F7F8FB;}
  .slot .row button.primary{background:var(--taupe-d);color:#fff;border-color:var(--taupe-d);}
  .slot .row button.primary:hover{background:#4a46c7;}
  .s-available{border-color:#CDEBD8;background:#F5FBF7;}
  .s-pending{border-color:#F6E2C0;background:#FFFBF3;}
  .s-reserved{border-color:#D9D7F7;background:#F7F6FE;}
  .s-attended{background:#FAFBFC;}
  .s-cancelled{opacity:.55;}
  .s-closed{background:#fff;}

  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:14px;margin-bottom:20px;}
  .kpi{display:flex;align-items:center;gap:13px;background:#fff;border:1px solid var(--line);border-radius:16px;padding:16px;box-shadow:0 1px 2px rgba(16,24,40,.05);}
  .kpi-ic{width:42px;height:42px;border-radius:12px;flex:none;display:flex;align-items:center;justify-content:center;}
  .kpi-ic svg{width:20px;height:20px;}
  .ic-violet{background:#EDEBFE;color:#5B57E0;}
  .ic-orange{background:#FDF0E2;color:#E0922F;}
  .ic-blue{background:#E8EEFC;color:#3F6BD8;}
  .ic-green{background:#E5F5EC;color:#2E9E5B;}
  .ic-gray{background:#EEF0F4;color:#7C8698;}
  .kpi .k{font-size:11px;letter-spacing:.04em;text-transform:uppercase;color:var(--inkSoft);font-weight:600;}
  .kpi .v{font-size:25px;font-weight:700;color:var(--brown);margin-top:3px;line-height:1.1;}
  .kpi-sub{font-size:11.5px;color:var(--inkSoft);margin-top:2px;}
  .panel{background:#fff;border:1px solid var(--line);border-radius:16px;padding:20px;margin-bottom:16px;box-shadow:0 1px 2px rgba(16,24,40,.04);}
  .chart{display:flex;align-items:flex-end;gap:10px;height:170px;padding-top:6px;}
  .chart .bw{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;height:100%;justify-content:flex-end;}
  .chart .bar{width:100%;max-width:46px;border-radius:7px 7px 0 0;background:#DAD8F6;}
  .chart .bar.today{background:var(--taupe-d);}
  .chart .lbl{font-size:11px;color:var(--inkSoft);}
  .rank .r{display:flex;justify-content:space-between;padding:10px 0;border-top:1px solid var(--line);font-size:14px;color:var(--ink);}
  .rank .r:first-child{border-top:none;}
  .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  @media(max-width:760px){.grid-2{grid-template-columns:1fr;}}

  .ovl{position:fixed;inset:0;background:rgba(16,22,42,.5);backdrop-filter:blur(4px);z-index:90;display:flex;align-items:center;justify-content:center;padding:18px;}
  .modal{background:#fff;border-radius:20px;width:560px;max-width:100%;max-height:94vh;overflow:auto;padding:26px;box-shadow:0 30px 70px -20px rgba(16,24,40,.4);}
  .modal .top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;}
  .modal h3{font-size:22px;font-style:normal;}
  .x{background:none;border:none;color:var(--inkSoft);font-size:22px;line-height:1;}
  .items{border:1px solid var(--line);border-radius:12px;overflow:hidden;margin:12px 0;}
  .items .ih,.items .ir{display:grid;grid-template-columns:1fr 64px 92px 92px 34px;gap:8px;align-items:center;padding:9px 12px;}
  .items .ih{background:var(--cream2);font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--inkSoft);font-weight:600;}
  .items .ir{border-top:1px solid var(--line);}
  .items .ir input,.items .ir select{padding:8px 9px;font-size:13px;}
  .items .sub{font-weight:700;font-size:15px;color:var(--brown);text-align:right;}
  .items .del{background:none;border:none;color:var(--red);font-size:16px;}
  .add{font-size:12px;font-weight:600;letter-spacing:.02em;color:var(--taupe-d);background:#fff;border:1px dashed var(--taupe);border-radius:9px;padding:10px;width:100%;}
  .add:hover{background:#F7F8FB;}
  .total{display:flex;justify-content:space-between;align-items:center;margin:14px 0;}
  .total .big{font-weight:700;font-size:28px;color:var(--brown);}
  .head .btn{padding:10px 16px;font-size:13px;}
  .svc-row{display:flex;align-items:center;gap:12px;padding:14px 16px;border-top:1px solid var(--line);}
  .svc-row:first-child{border-top:none;}
  .svc-main{flex:1;min-width:0;}
  .svc-name{font-weight:600;color:var(--brown);}
  .svc-off{font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:#fff;background:var(--gray);border-radius:99px;padding:2px 7px;margin-left:6px;}
  .svc-meta{font-size:12px;color:var(--inkSoft);margin-top:3px;}
  .svc-price{font-weight:700;font-size:17px;color:var(--brown);white-space:nowrap;}
  .svc-acts{display:flex;gap:6px;flex-wrap:wrap;}
  .svc-acts button{font-size:11px;font-weight:600;letter-spacing:.02em;text-transform:uppercase;border:1px solid var(--line);background:#fff;border-radius:8px;padding:7px 10px;color:var(--brown);}
  .svc-acts button:hover{background:#F7F8FB;}
  .svc-acts button.danger{color:var(--red);border-color:rgba(220,38,38,.35);}
  .sw{display:flex;align-items:center;gap:9px;font-size:14px;color:var(--ink);margin-top:8px;cursor:pointer;}
  .sw input{width:auto;}
  .cj-client{display:flex;justify-content:space-between;align-items:center;background:#F7F8FB;border:1px solid var(--line);border-radius:10px;padding:12px 14px;}
  .cj-client button{font-size:12px;font-weight:600;border:1px solid var(--line);background:#fff;border-radius:8px;padding:6px 10px;color:var(--brown);}
  .cj-results{display:flex;flex-direction:column;gap:4px;margin:-2px 0 8px;}
  .cj-result{display:flex;justify-content:space-between;text-align:left;background:#fff;border:1px solid var(--line);border-radius:9px;padding:9px 12px;font-size:14px;color:var(--brown);cursor:pointer;}
  .cj-result:hover{background:#F7F8FB;}
  .cj-result span{color:var(--inkSoft);font-size:12px;}
  .cj-empty{font-size:13px;color:var(--inkSoft);padding:4px 2px;}
  .cj-or{text-align:center;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--inkSoft);margin:10px 0;}
  .img-prev{width:100%;border-radius:12px;display:block;max-height:260px;object-fit:cover;border:1px solid var(--line);}
  .img-empty{border:1px dashed var(--taupe);border-radius:12px;padding:26px;text-align:center;color:var(--inkSoft);font-size:13px;line-height:1.5;}
  .img-empty span{font-size:11px;}
  .fld textarea{width:100%;border:1px solid var(--line);border-radius:10px;background:#fff;padding:10px 12px;font-size:14px;font-family:var(--ui);color:var(--brown);outline:none;resize:vertical;box-sizing:border-box;}
  @media(max-width:760px){.svc-row{flex-wrap:wrap;}.svc-price{order:-1;}}
  .toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:var(--espresso);color:#fff;padding:12px 20px;border-radius:12px;font-size:14px;z-index:120;opacity:0;transition:opacity .3s;box-shadow:0 10px 30px -8px rgba(16,24,40,.5);}
  .toast.show{opacity:1;}

</style>
</head>
<body>
<div id="app"></div>
<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
"use strict";
/* ╔══════════════════════════════════════════════════════════════╗
   ║  CONFIGURÁ AQUÍ tus credenciales de Supabase                  ║
   ║  (Settings → API en tu proyecto)                              ║
   ╚══════════════════════════════════════════════════════════════╝ */
var SUPABASE_URL = "https://dmmmjqtnondcururpann.supabase.co";
var SUPABASE_ANON_KEY = "sb_publishable_opntaMbjppwpzMWE5I14Ng_W7j_f--2";

var CFG = SUPABASE_URL.indexOf("TU-") === -1;
var sb = (CFG && window.supabase) ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY) : null;

var app = document.getElementById("app");
var STATES = {
  available:{label:"Disponible",color:"var(--green)"},
  pending:{label:"En proceso",color:"var(--yellow)"},
  reserved:{label:"Reservado",color:"var(--blue)"},
  attended:{label:"Atendido",color:"var(--gray)"},
  cancelled:{label:"Cancelado",color:"var(--red)"},
  closed:{label:"Cerrado",color:"var(--gray)"}
};
function money(n){ return "Bs " + new Intl.NumberFormat("es-BO",{maximumFractionDigits:0}).format(n||0); }
function todayISO(){ return new Date().toISOString().slice(0,10); }
function fdate(iso){ if(!iso) return ""; try{ return new Date(iso+"T00:00:00").toLocaleDateString("es-BO",{weekday:"long",day:"numeric",month:"long"}); }catch(e){ return iso; } }
function slotTimes(){ var a=[],h=9; while(h<19){ ["00","30"].forEach(function(m){ a.push((h<10?"0":"")+h+":"+m); }); h++; } return a; }
function esc(s){ return String(s==null?"":s).replace(/[&<>"]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];}); }
function toast(m){ var t=document.getElementById("toast"); t.textContent=m; t.classList.add("show"); setTimeout(function(){t.classList.remove("show");},2200); }

var state = { page:"agenda", date:todayISO(), services:[], slots:[], cobro:null, dash:null };

/* ───── arranque ───── */
async function init(){
  if(!sb){ renderConfig(); return; }
  try{
    var s = await sb.auth.getSession();
    if(s.data.session) await boot(); else renderLogin();
    sb.auth.onAuthStateChange(function(_e,session){ if(session) boot(); else renderLogin(); });
  }catch(e){ renderLogin(); }
}
async function boot(){
  try{ var r=await sb.from("services").select("*").order("name"); state.services=r.data||[]; }catch(e){ state.services=[]; }
  subscribeRealtime();
  go(state.page);
}
function subscribeRealtime(){
  try{
    sb.channel("rt-slots").on("postgres_changes",{event:"*",schema:"public",table:"slots"},function(){
      if(state.page==="agenda") loadAgenda();
    }).subscribe();
  }catch(e){}
}

/* ───── pantallas sin sesión ───── */
function renderConfig(){
  app.innerHTML =
    '<div class="center-screen"><div class="card">'+
    '<div class="label">Configuración</div><h2>Conectá Supabase</h2>'+
    '<p style="color:var(--ink);font-size:14px;margin:6px 0 14px">Abrí este archivo en un editor y completá tus credenciales (líneas al inicio del &lt;script&gt;):</p>'+
    '<div class="mono">var SUPABASE_URL = "https://tu-proyecto.supabase.co";<br>var SUPABASE_ANON_KEY = "tu-anon-key";</div>'+
    '<p style="color:var(--inkSoft);font-size:13px;margin-top:14px">Las encontrás en tu proyecto → Settings → API. Acordate de correr antes el archivo <b>supabase_schema.sql</b>.</p>'+
    '</div></div>';
}
/* authMode: "login" | "register" | "forgot" | "check-email" */
var authMode = "login";
function renderLogin(){
  var head, body, foot;
  if(authMode==="login"){
    head='<div class="label">Bienvenido</div><h2>Iniciar sesión</h2>';
    body='<div class="fld"><label>Email</label><input id="lg_email" type="email" placeholder="tu@email.com" autocomplete="email"/></div>'+
         '<div class="fld"><label>Contraseña</label><input id="lg_pass" type="password" placeholder="••••••" autocomplete="current-password"/></div>'+
         '<p class="err" id="lg_err" style="display:none"></p>'+
         '<button class="btn" id="lg_go" style="width:100%;margin-bottom:10px">Entrar</button>';
    foot='<div style="display:flex;justify-content:space-between;margin-top:4px">'+
         '<button class="auth-link" data-mode="register">Crear cuenta nueva</button>'+
         '<button class="auth-link" data-mode="forgot">Olvidé mi contraseña</button></div>';
  } else if(authMode==="register"){
    head='<div class="label">Primera vez</div><h2>Crear cuenta</h2>';
    body='<div class="fld"><label>Nombre del negocio</label><input id="lg_biz" placeholder="LUA Solarium & Beauty"/></div>'+
         '<div class="fld"><label>Tu email</label><input id="lg_email" type="email" placeholder="tu@email.com" autocomplete="email"/></div>'+
         '<div class="fld"><label>Contraseña</label><input id="lg_pass" type="password" placeholder="Mínimo 6 caracteres" autocomplete="new-password"/></div>'+
         '<div class="fld"><label>Repetir contraseña</label><input id="lg_pass2" type="password" placeholder="Repetí la contraseña" autocomplete="new-password"/></div>'+
         '<p class="err" id="lg_err" style="display:none"></p>'+
         '<button class="btn" id="lg_go" style="width:100%;margin-bottom:10px">Crear cuenta</button>';
    foot='<button class="auth-link" data-mode="login">Ya tengo cuenta · Iniciar sesión</button>';
  } else if(authMode==="forgot"){
    head='<div class="label">Recuperar acceso</div><h2>Olvidé mi contraseña</h2>';
    body='<p style="font-size:14px;color:var(--ink);margin:4px 0 14px">Te enviamos un link para resetear tu contraseña.</p>'+
         '<div class="fld"><label>Tu email</label><input id="lg_email" type="email" placeholder="tu@email.com"/></div>'+
         '<p class="err" id="lg_err" style="display:none"></p>'+
         '<button class="btn" id="lg_go" style="width:100%;margin-bottom:10px">Enviar link</button>';
    foot='<button class="auth-link" data-mode="login">Volver a iniciar sesión</button>';
  } else if(authMode==="check-email"){
    head='<div class="label">Revisá tu email</div><h2>¡Listo!</h2>';
    body='<div style="text-align:center;padding:10px 0 18px">'+
         '<div style="font-size:40px;margin-bottom:12px">📧</div>'+
         '<p style="font-size:15px;color:var(--ink)">Te enviamos un email de confirmación.<br>Revisá tu bandeja y seguí el link.</p></div>';
    foot='<button class="auth-link" data-mode="login">Volver a iniciar sesión</button>';
  }
  app.innerHTML='<div class="center-screen"><div class="card">'+
    '<div style="display:flex;align-items:center;gap:10px;margin-bottom:18px">'+

  /* nav entre modos */
  document.querySelectorAll(".auth-link").forEach(function(b){
    b.addEventListener("click",function(){ authMode=this.dataset.mode; renderLogin(); });
  });
  /* enter en campos */
  ["lg_email","lg_pass","lg_pass2"].forEach(function(id){
    var el=document.getElementById(id); if(el) el.addEventListener("keydown",function(e){ if(e.key==="Enter") doAuth(); });
  });

async function doAuth(){
  var email=(document.getElementById("lg_email")?document.getElementById("lg_email").value:"").trim();
  var pass=document.getElementById("lg_pass")?document.getElementById("lg_pass").value:"";
  var err=document.getElementById("lg_err");
  if(err) err.style.display="none";
  var btn=document.getElementById("lg_go"); if(btn){ btn.disabled=true; btn.textContent="Espera…"; }

  try{
    if(authMode==="login"){
      var r=await sb.auth.signInWithPassword({email:email,password:pass});
      if(r.error){ showAuthErr(r.error.message); return; }

    } else if(authMode==="register"){
      if(!email||!pass){ showAuthErr("Completá todos los campos."); return; }
      var pass2=document.getElementById("lg_pass2")?document.getElementById("lg_pass2").value:"";
      if(pass!==pass2){ showAuthErr("Las contraseñas no coinciden."); return; }
      if(pass.length<6){ showAuthErr("La contraseña debe tener al menos 6 caracteres."); return; }
      var r2=await sb.auth.signUp({email:email,password:pass});
      if(r2.error){ showAuthErr(r2.error.message); return; }
      authMode="check-email"; renderLogin(); return;

    } else if(authMode==="forgot"){
      if(!email){ showAuthErr("Ingresá tu email."); return; }
      var r3=await sb.auth.resetPasswordForEmail(email,{redirectTo:window.location.href});
      if(r3.error){ showAuthErr(r3.error.message); return; }
      authMode="check-email"; renderLogin(); return;
    }
  } catch(e){ showAuthErr("Error inesperado. Intentá de nuevo."); }
}
function showAuthErr(msg){
  var err=document.getElementById("lg_err"); if(err){ err.textContent=msg; err.style.display="block"; }
  var btn=document.getElementById("lg_go"); if(btn){ btn.disabled=false; btn.textContent=authMode==="login"?"Entrar":authMode==="register"?"Crear cuenta":"Enviar link"; }
}

function slotByTime(t){ for(var i=0;i<state.slots.length;i++){ if(state.slots[i].time===t) return state.slots[i]; } return null; }
function renderAgenda(){

async function slotOpen(t){ await sb.from("slots").upsert({date:state.date,time:t,status:"available",client_id:null,service_id:null,customer_name:null,customer_phone:null,note:null},{onConflict:"date,time"}); loadAgenda(); }
async function slotClose(t){ await sb.from("slots").delete().eq("date",state.date).eq("time",t).eq("status","available"); loadAgenda(); }
function slotConfirm(id){
  var s=state.slots.filter(function(x){return x.id===id;})[0];

  sb.from("slots").update({status:"reserved",updated_at:new Date().toISOString()}).eq("id",id).then(function(){ loadAgenda(); });

function waPhone(raw){ var d=(raw||"").replace(/\D/g,""); if(!d) return ""; if(d.indexOf("591")===0) return d; if(d.length<=8) return "591"+d; return d; }
function fmtDateLong(iso){ try{ var p=(iso||"").split("-"); var d=new Date(Number(p[0]),Number(p[1])-1,Number(p[2])); return d.toLocaleDateString("es-BO",{weekday:"long",day:"numeric",month:"long"}); }catch(e){ return iso; } }
function svcFromSlot(s){
  var name="", price=null;
  if(s.service_id){ var sv=state.services.filter(function(x){return x.id===s.service_id;})[0]; if(sv){ name=sv.name; price=sv.price; } }
  if(!name && s.note){ name=s.note.replace(/^\s*Servicio:\s*/i,"").trim(); }
  if(price===null && name){ var m=state.services.filter(function(x){return (x.name||"").toLowerCase()===name.toLowerCase();})[0]; if(m) price=m.price; }
  return {name:name, price:price};
}
function openWhatsAppConfirm(s){
  var ph=waPhone(s.customer_phone); if(!ph) return;
  var info=svcFromSlot(s);
  var L=["¡Hola "+((s.customer_name||"").trim())+"! 🌙 Tu reserva en LUA Solarium & Beauty quedó confirmada ✅","","🗓 "+fmtDateLong(s.date)+" · "+(s.time||"")];
  if(info.name) L.push("💆 "+info.name);
  if(info.price!=null) L.push("💵 Bs "+info.price);
  L.push("","El pago es al llegar al local. ¡Te esperamos! 🌙");
  window.open("https://wa.me/"+ph+"?text="+encodeURIComponent(L.join("\n")),"_blank");
}
async function slotCancel(id){ await sb.from("slots").update({status:"available",client_id:null,service_id:null,customer_name:null,customer_phone:null,note:null,updated_at:new Date().toISOString()}).eq("id",id); loadAgenda(); }
async function jornadaOpen(){
  var rows=slotTimes().map(function(t){ return {date:state.date,time:t,status:"available"}; });
  var existing={}; state.slots.forEach(function(s){ existing[s.time]=1; });
  rows=rows.filter(function(r){ return !existing[r.time]; });
  if(rows.length){ await sb.from("slots").insert(rows); }
  loadAgenda();
}

function cobroTotal(){ return state.cobro.items.reduce(function(a,it){ return a + (Number(it.quantity)||0)*(Number(it.unit_price)||0); },0); }

    '<button class="btn" id="co_save" style="width:100%">Registrar venta</button>'+

function closeCobro(){ state.cobro=null; var h=document.getElementById("cobroHolder"); if(h) h.innerHTML=""; }
function syncCobroFromDOM(){
  if(!state.cobro) return;
  document.querySelectorAll(".ir").forEach(function(row,i){
    var svc=row.querySelector(".ci-svc"), qty=row.querySelector(".ci-qty"), price=row.querySelector(".ci-price");
    if(state.cobro.items[i]){
      state.cobro.items[i].service_id=svc.value;
      state.cobro.items[i].description=svc.options[svc.selectedIndex]?svc.options[svc.selectedIndex].text:"";

function recalcCobro(){
  state.cobro.items.forEach(function(it,i){ var el=document.getElementById("sub-"+i); if(el) el.textContent=money((it.quantity||0)*(it.unit_price||0)); });
  var tt=document.getElementById("cobroTotal"); if(tt) tt.textContent=money(cobroTotal());

async function saveCobro(){
  syncCobroFromDOM();
  var c=state.cobro;
  var method=document.getElementById("co_method").value;

  var items=c.items.filter(function(it){ return (Number(it.unit_price)||0)>0 || it.service_id; });
  if(!items.length){ toast("Agregá al menos un ítem"); return; }
  var payload=items.map(function(it){ return {service_id:it.service_id||null, description:it.description||"Servicio", quantity:Number(it.quantity)||1, unit_price:Number(it.unit_price)||0}; });

  var r=await sb.rpc("register_sale",{p_slot_id:c.slotId,p_client_id:c.clientId,p_method:method,p_notes:notes,p_items:payload});

/* ───── DASHBOARD ───── */
async function loadDashboard(){
  app.innerHTML = shell('<div class="head"><h2>Cargando…</h2></div>');
  var since=new Date(); since.setDate(since.getDate()-30); var sinceISO=since.toISOString();
  var sales=[]; var slotsToday=[];
  try{ var r=await sb.from("sales").select("total,sale_date,payment_method,sale_items(description,quantity)").gte("sale_date",sinceISO).order("sale_date",{ascending:false}); sales=r.data||[]; }catch(e){}
  try{ var r2=await sb.from("slots").select("status").eq("date",todayISO()); slotsToday=r2.data||[]; }catch(e){}
  renderDashboard(sales, slotsToday);
}
function renderDashboard(sales, slotsToday){
  var today=todayISO();
  var todaySales=sales.filter(function(s){ return (s.sale_date||"").slice(0,10)===today; });
  var incomeToday=todaySales.reduce(function(a,b){return a+Number(b.total||0);},0);
  var pend=slotsToday.filter(function(s){return s.status==="pending";}).length;
  var resv=slotsToday.filter(function(s){return s.status==="reserved";}).length;
  var att=slotsToday.filter(function(s){return s.status==="attended";}).length;

  /* ventas últimos 7 días */
  var days=[]; for(var i=6;i>=0;i--){ var d=new Date(); d.setDate(d.getDate()-i); days.push(d.toISOString().slice(0,10)); }
  var byDay=days.map(function(iso){ return {iso:iso,lbl:new Date(iso+"T00:00:00").toLocaleDateString("es-BO",{weekday:"short"}),total:sales.filter(function(s){return (s.sale_date||"").slice(0,10)===iso;}).reduce(function(a,b){return a+Number(b.total||0);},0)}; });
  var max=Math.max(1,Math.max.apply(null,byDay.map(function(d){return d.total;})));
  var week=byDay.reduce(function(a,b){return a+b.total;},0);

  /* top servicios (del detalle) */
  var cnt={}; sales.forEach(function(s){ (s.sale_items||[]).forEach(function(it){ cnt[it.description]=(cnt[it.description]||0)+(it.quantity||0); }); });
  var top=Object.keys(cnt).map(function(k){return [k,cnt[k]];}).sort(function(a,b){return b[1]-a[1];}).slice(0,6);

  var chart='<div class="chart">'+byDay.map(function(d){ var h=(d.total/max)*100; return '<div class="bw"><div class="bar'+(d.iso===today?" today":"")+'" style="height:'+h+'%" title="'+money(d.total)+'"></div><div class="lbl">'+d.lbl+'</div></div>'; }).join("")+'</div>';

  var recent='<div class="rank">'+(sales.slice(0,8).map(function(s){ return '<div class="r"><span>'+new Date(s.sale_date).toLocaleDateString("es-BO",{day:"numeric",month:"short"})+' · '+(s.payment_method||"")+'</span><span style="font-family:var(--display);color:var(--brown)">'+money(s.total)+'</span></div>'; }).join("")||'<div style="color:var(--inkSoft);font-size:13px;padding:6px 0">Sin ventas aún.</div>')+'</div>';

      '<div class="grid-2"><div class="fld"><label>Nombre</label><input id="cj_nname" placeholder="Nombre y apellido"/></div>'+
      '<div class="fld"><label>WhatsApp</label><input id="cj_nphone" placeholder="Teléfono"/></div></div>';

    '<div class="head"><div><div class="label">Registrar venta</div><h2>Caja</h2></div></div>'+

      '<div class="panel"><div class="label" style="margin-bottom:10px">Cliente</div>'+clientBlock+'</div>'+
      '<div class="panel"><div class="label" style="margin-bottom:10px">Pago</div>'+
        '<div class="fld"><label>Método</label><select id="cj_method"><option value="efectivo">Efectivo</option><option value="qr">QR</option><option value="tarjeta">Tarjeta</option><option value="transferencia">Transferencia</option></select></div>'+
        '<div class="fld"><label>Nota (opcional)</label><input id="cj_notes" placeholder="Observación"/></div>'+
      '</div>'+
    '</div>'+
    '<div class="panel"><div class="label" style="margin-bottom:10px">Servicios</div>'+

      '<button class="add" data-act="cj-additem">+ Agregar servicio</button>'+
      '<div class="total"><div><div class="label">Total</div></div><div class="big" id="cajaTotal">'+money(cajaTotal())+'</div></div>'+
      '<button class="btn" id="cj_save" style="width:100%">Registrar venta</button>'+
    '</div>'
  );

  var nn=document.getElementById("cj_notes"); if(nn) nn.value=c.notes;

function syncCajaFromDOM(){
  if(!state.caja) return;
  document.querySelectorAll(".items .ir").forEach(function(row,i){
    var svc=row.querySelector(".cj-svc"); if(!svc||!state.caja.items[i]) return;
    var qty=row.querySelector(".cj-qty"), price=row.querySelector(".cj-price");
    state.caja.items[i].service_id=svc.value;
    state.caja.items[i].description=svc.options[svc.selectedIndex]?svc.options[svc.selectedIndex].text:"";
    state.caja.items[i].quantity=Number(qty.value)||1;
    state.caja.items[i].unit_price=Number(price.value)||0;
  });
  var mm=document.getElementById("cj_method"); if(mm) state.caja.method=mm.value;
  var nn=document.getElementById("cj_notes"); if(nn) state.caja.notes=nn.value;
}
function recalcCaja(){
  state.caja.items.forEach(function(it,i){ var el=document.getElementById("cjsub-"+i); if(el) el.textContent=money((it.quantity||0)*(it.unit_price||0)); });
  var tt=document.getElementById("cajaTotal"); if(tt) tt.textContent=money(cajaTotal());
}
var cjSearchT=null;
function cjSearch(q){
  var box=document.getElementById("cj_results"); if(!box) return;
  q=(q||"").replace(/[,%()]/g,"").trim();
  if(q.length<2){ box.innerHTML=""; return; }
  clearTimeout(cjSearchT);
  cjSearchT=setTimeout(async function(){
    var r=await sb.from("clients").select("*").or("full_name.ilike.%"+q+"%,phone.ilike.%"+q+"%").limit(8);
    var list=r.data||[]; state.caja._results=list;
    box.innerHTML=list.length
      ? list.map(function(c){return '<button class="cj-result" data-act="cj-pickclient" data-id="'+c.id+'">'+esc(c.full_name)+' <span>'+esc(c.phone||"")+'</span></button>';}).join("")
      : '<div class="cj-empty">Sin resultados — podés crearlo abajo.</div>';
  },250);
}
function pickClient(id){ var c=(state.caja._results||[]).filter(function(x){return x.id===id;})[0]; if(c){ state.caja.client=c; renderCaja(); } }
function clearClient(){ state.caja.client=null; renderCaja(); }
async function saveCaja(){
  syncCajaFromDOM();
  var c=state.caja;
  var items=c.items.filter(function(it){ return it.service_id || (Number(it.unit_price)||0)>0; });
  if(!items.length){ toast("Agregá al menos un servicio"); return; }
  document.getElementById("cj_save").disabled=true;
  var clientId=null;
  try{
    if(c.client){ clientId=c.client.id; }
    else {
      var nm=(document.getElementById("cj_nname")?document.getElementById("cj_nname").value:"").trim();
      var ph=(document.getElementById("cj_nphone")?document.getElementById("cj_nphone").value:"").trim();
      if(nm||ph){
        if(ph){ var f=await sb.from("clients").select("id").eq("phone",ph).maybeSingle(); if(f.data) clientId=f.data.id; }
        if(!clientId){
          var ins=await sb.from("clients").insert({full_name:nm||"Cliente",phone:ph||("s/d-"+Date.now())}).select("id").single();
          if(ins.error){ toast("Error con el cliente: "+ins.error.message); document.getElementById("cj_save").disabled=false; return; }
          clientId=ins.data.id;
        }
      }
    }
  }catch(e){ toast("Error con el cliente"); document.getElementById("cj_save").disabled=false; return; }
  var payload=items.map(function(it){ return {service_id:it.service_id||null, description:it.description||"Servicio", quantity:Number(it.quantity)||1, unit_price:Number(it.unit_price)||0}; });
  var r=await sb.rpc("register_sale",{p_slot_id:null,p_client_id:clientId,p_method:c.method,p_notes:c.notes,p_items:payload});
  if(r.error){ toast("Error: "+r.error.message); document.getElementById("cj_save").disabled=false; return; }
  toast("Venta registrada ✓"); loadCaja();
}

async function uploadSiteImage(key, file){
  if(!file) return;
  if(file.size>5*1024*1024){ toast("La imagen es muy pesada (máx 5 MB)"); return; }
  toast("Subiendo imagen…");
  var ext=((file.name.split(".").pop()||"jpg").toLowerCase().replace(/[^a-z0-9]/g,""))||"jpg";
  var path="site/"+key+"-"+Date.now()+"."+ext;
  var up=await sb.storage.from("media").upload(path,file,{cacheControl:"3600",upsert:true,contentType:file.type||"image/jpeg"});
  if(up.error){ toast("Error al subir: "+up.error.message); return; }
  var url=sb.storage.from("media").getPublicUrl(path).data.publicUrl;
  var r=await sb.from("site_images").upsert({key:key,url:url,updated_at:new Date().toISOString()});
  if(r.error){ toast("Error al guardar: "+r.error.message); return; }
  toast("Imagen actualizada ✓"); loadImagenes();
}
async function resetSiteImage(key){
  await sb.from("site_images").upsert({key:key,url:null,updated_at:new Date().toISOString()});
  toast("Volvió a la imagen del diseño"); loadImagenes();
}
async function saveSiteCaption(key){
  var ta=document.getElementById("imgd-"+key); if(!ta) return;
  var r=await sb.from("site_images").upsert({key:key,caption:ta.value,updated_at:new Date().toISOString()});
  if(r.error){ toast("Error: "+r.error.message); return; }
  if(!state.siteImages[key]) state.siteImages[key]={};
  state.siteImages[key].caption=ta.value;
  toast("Descripción guardada ✓");
}

  var a=el.dataset.act, t=el.dataset.t, id=el.dataset.id;
  if(a==="page") go(el.dataset.arg);
  else if(a==="toggleside"){ var sd=document.getElementById("side"), bd=document.querySelector(".backdrop"); if(sd)sd.classList.toggle("open"); if(bd)bd.classList.toggle("open"); }
  else if(a==="closeside"){ var s2=document.getElementById("side"), b2=document.querySelector(".backdrop"); if(s2)s2.classList.remove("open"); if(b2)b2.classList.remove("open"); }
  else if(a==="logout") sb.auth.signOut();
  else if(a==="prev") shiftDate(-1);
  else if(a==="next") shiftDate(1);
  else if(a==="open") slotOpen(t);
  else if(a==="close") slotClose(t);
  else if(a==="confirm") slotConfirm(id);
  else if(a==="cancel") slotCancel(id);
  else if(a==="cobro") openCobro(id);
  else if(a==="allopen") jornadaOpen();
  else if(a==="allclose") jornadaClose();
  else if(a==="svc-new") openSvc(null);
  else if(a==="svc-edit") openSvc(id);
  else if(a==="svc-toggle") toggleSvc(id);
  else if(a==="svc-del") delSvc(id);
  else if(a==="cj-additem"){ syncCajaFromDOM(); state.caja.items.push({service_id:"",description:"",quantity:1,unit_price:0}); renderCaja(); }
  else if(a==="cj-delitem"){ syncCajaFromDOM(); state.caja.items.splice(Number(el.dataset.i),1); if(!state.caja.items.length) state.caja.items.push({service_id:"",description:"",quantity:1,unit_price:0}); renderCaja(); }
  else if(a==="cj-clearclient") clearClient();
  else if(a==="cj-pickclient") pickClient(id);
  else if(a==="img-pick"){ var f=document.getElementById("imgf-"+el.dataset.key); if(f) f.click(); }
  else if(a==="img-reset") resetSiteImage(el.dataset.key);
  else if(a==="img-savedesc") saveSiteCaption(el.dataset.key);
});
app.addEventListener("keydown", function(e){ if(e.key==="Enter" && (e.target.id==="lg_pass"||e.target.id==="lg_email")) doAuth(); });

/* eventos del modal de cobro (en body, fuera de #app) */
document.body.addEventListener("click", function(e){
  var el=e.target.closest("[data-act]"); if(!el) return;
  var a=el.dataset.act;
  if(a==="closecobro"){ if(e.target.closest("[data-stop]") && !e.target.matches('[data-act="closecobro"]')) return; closeCobro(); }
  else if(a==="additem"){ syncCobroFromDOM(); state.cobro.items.push({service_id:"",description:"",quantity:1,unit_price:0}); renderCobro(); }
  else if(a==="delitem"){ syncCobroFromDOM(); state.cobro.items.splice(Number(el.dataset.i),1); if(!state.cobro.items.length) state.cobro.items.push({service_id:"",description:"",quantity:1,unit_price:0}); renderCobro(); }
  else if(a==="svc-close"){ if(e.target.closest("[data-stop]") && !e.target.matches('[data-act="svc-close"]')) return; closeSvc(); }
});
document.body.addEventListener("click", function(e){
  if(e.target.id==="co_save") saveCobro();
  else if(e.target.id==="cj_save") saveCaja();
  else if(e.target.id==="sv_save") saveSvc();
  else if(e.target.id==="cfg_save") saveAjustes();
});
document.body.addEventListener("change", function(e){
  if(e.target.classList && e.target.classList.contains("ci-svc")){
    var i=Number(e.target.dataset.i), sv=state.services.filter(function(x){return x.id===e.target.value;})[0];
    if(sv){ var row=e.target.closest(".ir"); var pr=row.querySelector(".ci-price"); if(pr) pr.value=Number(sv.price); }
    syncCobroFromDOM(); recalcCobro();
  }
  if(e.target.classList && e.target.classList.contains("cj-svc")){
    var sv2=state.services.filter(function(x){return x.id===e.target.value;})[0];
    if(sv2){ var row2=e.target.closest(".ir"); var pr2=row2.querySelector(".cj-price"); if(pr2) pr2.value=Number(sv2.price); }
    syncCajaFromDOM(); recalcCaja();
  }
  if(e.target.id==="ag_date"){ state.date=e.target.value; loadAgenda(); }
});
document.body.addEventListener("change", function(e){
  if(e.target.classList && e.target.classList.contains("img-file") && e.target.files && e.target.files[0]){
    uploadSiteImage(e.target.dataset.key, e.target.files[0]);
  }
});
document.body.addEventListener("input", function(e){
  if(e.target.classList && (e.target.classList.contains("ci-qty")||e.target.classList.contains("ci-price"))){ syncCobroFromDOM(); recalcCobro(); }
  if(e.target.classList && (e.target.classList.contains("cj-qty")||e.target.classList.contains("cj-price"))){ syncCajaFromDOM(); recalcCaja(); }
  if(e.target.id==="cj_search") cjSearch(e.target.value);
});

init();
</script>
</body>
