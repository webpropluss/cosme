<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LUA · Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  :root{
    --cream:#F2ECE3;--cream2:#E9E0D4;--paper:#FBF8F3;--brown:#4A3D34;--ink:#5C4F45;--inkSoft:#8B8077;
    --taupe:#A89A8B;--taupe-d:#8A7A6B;--gold:#B89B6E;--espresso:#2E251F;--line:rgba(74,61,52,.16);
    --green:#5E8C6A;--yellow:#C9A23F;--blue:#4A6B8A;--gray:#B3A99B;--red:#A8473A;
    --display:'Cormorant Garamond',Georgia,serif;--ui:'Jost',system-ui,sans-serif;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--cream);color:var(--ink);font-family:var(--ui);font-weight:300;font-size:15px;-webkit-font-smoothing:antialiased;}
  h1,h2,h3{font-family:var(--display);font-weight:600;color:var(--brown);margin:0;}
  button{font-family:var(--ui);cursor:pointer;}
  input,select,textarea{font-family:var(--ui);font-size:14px;color:var(--brown);border:1px solid var(--line);border-radius:10px;background:#fff;padding:10px 12px;width:100%;}
  .label{font-family:var(--ui);font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--taupe-d);}
  .btn{display:inline-flex;align-items:center;gap:8px;justify-content:center;border:1px solid var(--taupe-d);background:var(--taupe-d);color:#FBF8F3;border-radius:10px;padding:11px 18px;font-size:13px;letter-spacing:.06em;}
  .btn.ghost{background:transparent;color:var(--brown);border-color:var(--line);}
  .btn.sm{padding:7px 12px;font-size:12px;border-radius:8px;}
  .btn:disabled{opacity:.5;cursor:not-allowed;}

  /* login / config */
  .center-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:22px;}
  .card{background:var(--paper);border:1px solid var(--line);border-radius:18px;padding:30px;width:400px;max-width:100%;}
  .card h2{font-size:30px;font-style:italic;margin-bottom:4px;}
  .fld{margin-bottom:14px;}
  .fld label{display:block;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--taupe-d);margin-bottom:6px;}
  .err{color:var(--red);font-size:13px;margin:6px 0 0;}
  .auth-link{background:none;border:none;color:var(--taupe-d);font-size:13px;cursor:pointer;font-family:var(--ui);text-decoration:underline;padding:0;}
  .auth-link:hover{color:var(--brown);}
  .mono{font-family:ui-monospace,monospace;font-size:12px;background:#fff;border:1px solid var(--line);border-radius:8px;padding:8px 10px;word-break:break-all;}

  /* shell */
  .topbar{display:none;}
  .backdrop{display:none;}
  .shell{display:grid;grid-template-columns:210px 1fr;min-height:100vh;}
  .side{background:var(--espresso);color:#E8DAC6;padding:22px 14px;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow:auto;}
  .side .lg{font-family:var(--display);font-weight:600;font-size:22px;letter-spacing:.2em;color:#F3ECE2;padding-left:8px;margin-bottom:24px;}
  .side a{display:flex;align-items:center;gap:10px;color:#cdbca5;border:none;background:transparent;border-radius:9px;padding:12px 12px;font-size:14.5px;text-align:left;margin-bottom:3px;cursor:pointer;}
  .side a.on{background:rgba(184,155,110,.22);color:#F3ECE2;}
  .side a:hover{color:#F3ECE2;}
  .side .out{margin-top:auto;color:#9b8a73;font-size:13px;cursor:pointer;}
  .main{padding:24px 26px 60px;overflow:auto;min-width:0;}
  @media(max-width:760px){
    .topbar{display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:60;background:var(--espresso);color:#F3ECE2;padding:12px 16px;}
    .burger{background:none;border:none;color:#F3ECE2;font-size:22px;line-height:1;cursor:pointer;padding:2px 6px;}
    .tb-lg{font-family:var(--display);font-weight:600;font-size:20px;letter-spacing:.2em;}
    .shell{grid-template-columns:1fr;}
    .side{position:fixed;top:0;left:0;bottom:0;width:236px;max-width:82vw;z-index:80;height:auto;transform:translateX(-100%);transition:transform .25s ease;}
    .side.open{transform:none;}
    .backdrop{display:block;position:fixed;inset:0;background:rgba(46,37,31,.45);z-index:70;opacity:0;pointer-events:none;transition:opacity .25s;}
    .backdrop.open{opacity:1;pointer-events:auto;}
    .main{padding:18px 16px 64px;}
  }

  .head{display:flex;align-items:flex-end;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:18px;}
  .head h2{font-size:30px;font-style:italic;}
  .datenav{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
  .datenav input[type=date]{width:auto;}
  .navbtn{width:38px;height:38px;border-radius:10px;border:1px solid var(--line);background:#fff;font-size:18px;color:var(--brown);}
  .tools{display:flex;gap:8px;margin:6px 0 14px;flex-wrap:wrap;}
  .tools button{font-size:11px;letter-spacing:.1em;text-transform:uppercase;border:1px solid var(--line);background:#fff;border-radius:9px;padding:9px 13px;color:var(--brown);}
  .summary{font-size:14px;color:var(--ink);margin-bottom:8px;}
  .legend{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:16px;}
  .legend span{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--ink);}
  .legend i{width:11px;height:11px;border-radius:4px;}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:10px;}
  .slot{border:1px solid var(--line);border-radius:14px;padding:12px 13px;background:#fff;}
  .slot .t{font-family:var(--display);font-weight:600;font-size:23px;color:var(--brown);line-height:1;}
  .slot .chip{display:inline-block;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#fff;border-radius:99px;padding:3px 8px;margin-top:6px;}
  .slot .who{font-size:12px;color:var(--inkSoft);margin-top:6px;min-height:1.1em;line-height:1.3;}
  .slot .row{display:flex;gap:6px;margin-top:9px;flex-wrap:wrap;}
  .slot .row button{font-size:11px;letter-spacing:.04em;text-transform:uppercase;border-radius:8px;padding:6px 10px;border:1px solid var(--line);background:transparent;color:var(--brown);}
  .slot .row button.primary{background:var(--taupe-d);color:#fff;border-color:var(--taupe-d);}
  .s-available{border-color:var(--green);}
  .s-pending{border-color:var(--yellow);background:#FBF6E9;}
  .s-reserved{border-color:var(--blue);background:#EEF3F7;}
  .s-attended{border-color:var(--gray);background:#F3F0EB;opacity:.92;}
  .s-cancelled{opacity:.5;}
  .s-closed{opacity:.5;}

  /* kpis / dashboard */
  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:18px;}
  .kpi{background:var(--paper);border:1px solid var(--line);border-radius:13px;padding:15px;}
  .kpi .k{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--inkSoft);}
  .kpi .v{font-family:var(--display);font-weight:600;font-size:28px;color:var(--brown);margin-top:5px;}
  .panel{background:var(--paper);border:1px solid var(--line);border-radius:14px;padding:18px;margin-bottom:16px;}
  .chart{display:flex;align-items:flex-end;gap:10px;height:160px;padding-top:6px;}
  .chart .bw{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;height:100%;justify-content:flex-end;}
  .chart .bar{width:100%;max-width:42px;border-radius:6px 6px 0 0;background:var(--blush,#E9C9AE);background:#D8C3A8;}
  .chart .bar.today{background:var(--taupe-d);}
  .chart .lbl{font-size:11px;color:var(--inkSoft);}
  .rank .r{display:flex;justify-content:space-between;padding:8px 0;border-top:1px solid var(--line);font-size:14px;}
  .rank .r:first-child{border-top:none;}
  .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  @media(max-width:760px){.grid-2{grid-template-columns:1fr;}}

  /* modal cobro */
  .ovl{position:fixed;inset:0;background:rgba(46,37,31,.55);backdrop-filter:blur(4px);z-index:90;display:flex;align-items:center;justify-content:center;padding:18px;}
  .modal{background:var(--paper);border-radius:20px;width:560px;max-width:100%;max-height:94vh;overflow:auto;padding:26px;}
  .modal .top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;}
  .modal h3{font-size:28px;font-style:italic;}
  .x{background:none;border:none;color:var(--inkSoft);font-size:22px;line-height:1;}
  .items{border:1px solid var(--line);border-radius:12px;overflow:hidden;margin:12px 0;}
  .items .ih,.items .ir{display:grid;grid-template-columns:1fr 64px 92px 92px 34px;gap:8px;align-items:center;padding:9px 12px;}
  .items .ih{background:var(--cream2);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--taupe-d);}
  .items .ir{border-top:1px solid var(--line);}
  .items .ir input,.items .ir select{padding:8px 9px;font-size:13px;}
  .items .sub{font-family:var(--display);font-weight:600;font-size:16px;color:var(--brown);text-align:right;}
  .items .del{background:none;border:none;color:var(--red);font-size:16px;}
  .add{font-size:12px;letter-spacing:.06em;color:var(--taupe-d);background:#fff;border:1px dashed var(--line);border-radius:9px;padding:9px;width:100%;}
  .total{display:flex;justify-content:space-between;align-items:center;margin:14px 0;}
  .total .big{font-family:var(--display);font-weight:600;font-size:32px;color:var(--brown);}
  .head .btn{padding:10px 16px;font-size:13px;}
  .svc-row{display:flex;align-items:center;gap:12px;padding:13px 16px;border-top:1px solid var(--line);}
  .svc-row:first-child{border-top:none;}
  .svc-main{flex:1;min-width:0;}
  .svc-name{font-weight:500;color:var(--brown);}
  .svc-off{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:#fff;background:var(--gray);border-radius:99px;padding:2px 7px;margin-left:6px;}
  .svc-meta{font-size:12px;color:var(--inkSoft);margin-top:3px;}
  .svc-price{font-family:var(--display);font-weight:600;font-size:18px;color:var(--brown);white-space:nowrap;}
  .svc-acts{display:flex;gap:6px;flex-wrap:wrap;}
  .svc-acts button{font-size:11px;letter-spacing:.04em;text-transform:uppercase;border:1px solid var(--line);background:#fff;border-radius:8px;padding:7px 10px;color:var(--brown);}
  .svc-acts button.danger{color:var(--red);border-color:rgba(168,71,58,.4);}
  .sw{display:flex;align-items:center;gap:9px;font-size:14px;color:var(--ink);margin-top:6px;cursor:pointer;}
  .sw input{width:auto;}
  .cj-client{display:flex;justify-content:space-between;align-items:center;background:#fff;border:1px solid var(--line);border-radius:10px;padding:12px 14px;}
  .cj-client button{font-size:12px;border:1px solid var(--line);background:transparent;border-radius:8px;padding:6px 10px;color:var(--brown);}
  .cj-results{display:flex;flex-direction:column;gap:4px;margin:-2px 0 8px;}
  .cj-result{display:flex;justify-content:space-between;text-align:left;background:#fff;border:1px solid var(--line);border-radius:9px;padding:9px 12px;font-size:14px;color:var(--brown);cursor:pointer;}
  .cj-result span{color:var(--inkSoft);font-size:12px;}
  .cj-empty{font-size:13px;color:var(--inkSoft);padding:4px 2px;}
  .cj-or{text-align:center;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--inkSoft);margin:10px 0;}
  .img-prev{width:100%;border-radius:12px;display:block;max-height:260px;object-fit:cover;border:1px solid var(--line);}
  .img-empty{border:1px dashed var(--line);border-radius:12px;padding:26px;text-align:center;color:var(--inkSoft);font-size:13px;line-height:1.5;}
  .img-empty span{font-size:11px;}
  @media(max-width:760px){.svc-row{flex-wrap:wrap;}.svc-price{order:-1;}}
  .toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:var(--espresso);color:#F3ECE2;padding:12px 20px;border-radius:12px;font-size:14px;z-index:120;opacity:0;transition:opacity .3s;}
  .toast.show{opacity:1;}
</style>
</head>
<body>
<div id="app"></div>
<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
"use strict";
/* ╔══════════════════════════════════════════════════════════════╗
   ║  CONFIGURÁ AQUÍ tus credenciales de Supabase                  ║
   ║  (Settings → API en tu proyecto)                              ║
   ╚══════════════════════════════════════════════════════════════╝ */
var SUPABASE_URL = "https://dmmmjqtnondcururpann.supabase.co";
var SUPABASE_ANON_KEY = "sb_publishable_opntaMbjppwpzMWE5I14Ng_W7j_f--2";

var CFG = SUPABASE_URL.indexOf("TU-") === -1;
var sb = (CFG && window.supabase) ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY) : null;

var app = document.getElementById("app");
var STATES = {
  available:{label:"Disponible",color:"var(--green)"},
  pending:{label:"En proceso",color:"var(--yellow)"},
  reserved:{label:"Reservado",color:"var(--blue)"},
  attended:{label:"Atendido",color:"var(--gray)"},
  cancelled:{label:"Cancelado",color:"var(--red)"},
  closed:{label:"Cerrado",color:"var(--gray)"}
};
function money(n){ return "Bs " + new Intl.NumberFormat("es-BO",{maximumFractionDigits:0}).format(n||0); }
function todayISO(){ return new Date().toISOString().slice(0,10); }
function fdate(iso){ if(!iso) return ""; try{ return new Date(iso+"T00:00:00").toLocaleDateString("es-BO",{weekday:"long",day:"numeric",month:"long"}); }catch(e){ return iso; } }
function slotTimes(){ var a=[],h=9; while(h<19){ ["00","30"].forEach(function(m){ a.push((h<10?"0":"")+h+":"+m); }); h++; } return a; }
function esc(s){ return String(s==null?"":s).replace(/[&<>"]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];}); }
function toast(m){ var t=document.getElementById("toast"); t.textContent=m; t.classList.add("show"); setTimeout(function(){t.classList.remove("show");},2200); }

var state = { page:"agenda", date:todayISO(), services:[], slots:[], cobro:null, dash:null };

/* ───── arranque ───── */
async function init(){
  if(!sb){ renderConfig(); return; }
  try{
    var s = await sb.auth.getSession();
    if(s.data.session) await boot(); else renderLogin();
    sb.auth.onAuthStateChange(function(_e,session){ if(session) boot(); else renderLogin(); });
  }catch(e){ renderLogin(); }
}
async function boot(){
  try{ var r=await sb.from("services").select("*").order("name"); state.services=r.data||[]; }catch(e){ state.services=[]; }
  subscribeRealtime();
  go(state.page);
}
function subscribeRealtime(){
  try{
    sb.channel("rt-slots").on("postgres_changes",{event:"*",schema:"public",table:"slots"},function(){
      if(state.page==="agenda") loadAgenda();
    }).subscribe();
  }catch(e){}
}

/* ───── pantallas sin sesión ───── */
function renderConfig(){
  app.innerHTML =
    '<div class="center-screen"><div class="card">'+
    '<div class="label">Configuración</div><h2>Conectá Supabase</h2>'+
    '<p style="color:var(--ink);font-size:14px;margin:6px 0 14px">Abrí este archivo en un editor y completá tus credenciales (líneas al inicio del &lt;script&gt;):</p>'+
    '<div class="mono">var SUPABASE_URL = "https://tu-proyecto.supabase.co";<br>var SUPABASE_ANON_KEY = "tu-anon-key";</div>'+
    '<p style="color:var(--inkSoft);font-size:13px;margin-top:14px">Las encontrás en tu proyecto → Settings → API. Acordate de correr antes el archivo <b>supabase_schema.sql</b>.</p>'+
    '</div></div>';
}
/* authMode: "login" | "register" | "forgot" | "check-email" */
var authMode = "login";
function renderLogin(){
  var head, body, foot;
  if(authMode==="login"){
    head='<div class="label">Bienvenido</div><h2>Iniciar sesión</h2>';
    body='<div class="fld"><label>Email</label><input id="lg_email" type="email" placeholder="tu@email.com" autocomplete="email"/></div>'+
         '<div class="fld"><label>Contraseña</label><input id="lg_pass" type="password" placeholder="••••••" autocomplete="current-password"/></div>'+
         '<p class="err" id="lg_err" style="display:none"></p>'+
         '<button class="btn" id="lg_go" style="width:100%;margin-bottom:10px">Entrar</button>';
    foot='<div style="display:flex;justify-content:space-between;margin-top:4px">'+
         '<button class="auth-link" data-mode="register">Crear cuenta nueva</button>'+
         '<button class="auth-link" data-mode="forgot">Olvidé mi contraseña</button></div>';
  } else if(authMode==="register"){
    head='<div class="label">Primera vez</div><h2>Crear cuenta</h2>';
    body='<div class="fld"><label>Nombre del negocio</label><input id="lg_biz" placeholder="LUA Solarium & Beauty"/></div>'+
         '<div class="fld"><label>Tu email</label><input id="lg_email" type="email" placeholder="tu@email.com" autocomplete="email"/></div>'+
         '<div class="fld"><label>Contraseña</label><input id="lg_pass" type="password" placeholder="Mínimo 6 caracteres" autocomplete="new-password"/></div>'+
         '<div class="fld"><label>Repetir contraseña</label><input id="lg_pass2" type="password" placeholder="Repetí la contraseña" autocomplete="new-password"/></div>'+
         '<p class="err" id="lg_err" style="display:none"></p>'+
         '<button class="btn" id="lg_go" style="width:100%;margin-bottom:10px">Crear cuenta</button>';
    foot='<button class="auth-link" data-mode="login">Ya tengo cuenta · Iniciar sesión</button>';
  } else if(authMode==="forgot"){
    head='<div class="label">Recuperar acceso</div><h2>Olvidé mi contraseña</h2>';
    body='<p style="font-size:14px;color:var(--ink);margin:4px 0 14px">Te enviamos un link para resetear tu contraseña.</p>'+
         '<div class="fld"><label>Tu email</label><input id="lg_email" type="email" placeholder="tu@email.com"/></div>'+
         '<p class="err" id="lg_err" style="display:none"></p>'+
         '<button class="btn" id="lg_go" style="width:100%;margin-bottom:10px">Enviar link</button>';
    foot='<button class="auth-link" data-mode="login">Volver a iniciar sesión</button>';
  } else if(authMode==="check-email"){
    head='<div class="label">Revisá tu email</div><h2>¡Listo!</h2>';
    body='<div style="text-align:center;padding:10px 0 18px">'+
         '<div style="font-size:40px;margin-bottom:12px">📧</div>'+
         '<p style="font-size:15px;color:var(--ink)">Te enviamos un email de confirmación.<br>Revisá tu bandeja y seguí el link.</p></div>';
    foot='<button class="auth-link" data-mode="login">Volver a iniciar sesión</button>';
  }
  app.innerHTML='<div class="center-screen"><div class="card">'+
    '<div style="display:flex;align-items:center;gap:10px;margin-bottom:18px">'+
    '<span style="width:30px;height:30px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#FCEBC4,#E0A24A 45%,#B0772F);display:inline-block"></span>'+
    '<span style="font-family:var(--display);font-weight:600;font-size:22px;letter-spacing:.18em;color:var(--brown)">LUA</span></div>'+
    head+'<div style="margin-top:16px">'+body+'</div>'+
    '<div style="margin-top:8px;text-align:center">'+foot+'</div></div></div>';
  var el=document.getElementById("lg_email"); if(el) el.focus();
  /* nav entre modos */
  document.querySelectorAll(".auth-link").forEach(function(b){
    b.addEventListener("click",function(){ authMode=this.dataset.mode; renderLogin(); });
  });
  /* enter en campos */
  ["lg_email","lg_pass","lg_pass2"].forEach(function(id){
    var el=document.getElementById(id); if(el) el.addEventListener("keydown",function(e){ if(e.key==="Enter") doAuth(); });
  });
  var go=document.getElementById("lg_go"); if(go) go.addEventListener("click",doAuth);
}

async function doAuth(){
  var email=(document.getElementById("lg_email")?document.getElementById("lg_email").value:"").trim();
  var pass=document.getElementById("lg_pass")?document.getElementById("lg_pass").value:"";
  var err=document.getElementById("lg_err");
  if(err) err.style.display="none";
  var btn=document.getElementById("lg_go"); if(btn){ btn.disabled=true; btn.textContent="Espera…"; }

  try{
    if(authMode==="login"){
      var r=await sb.auth.signInWithPassword({email:email,password:pass});
      if(r.error){ showAuthErr(r.error.message); return; }

    } else if(authMode==="register"){
      if(!email||!pass){ showAuthErr("Completá todos los campos."); return; }
      var pass2=document.getElementById("lg_pass2")?document.getElementById("lg_pass2").value:"";
      if(pass!==pass2){ showAuthErr("Las contraseñas no coinciden."); return; }
      if(pass.length<6){ showAuthErr("La contraseña debe tener al menos 6 caracteres."); return; }
      var r2=await sb.auth.signUp({email:email,password:pass});
      if(r2.error){ showAuthErr(r2.error.message); return; }
      authMode="check-email"; renderLogin(); return;

    } else if(authMode==="forgot"){
      if(!email){ showAuthErr("Ingresá tu email."); return; }
      var r3=await sb.auth.resetPasswordForEmail(email,{redirectTo:window.location.href});
      if(r3.error){ showAuthErr(r3.error.message); return; }
      authMode="check-email"; renderLogin(); return;
    }
  } catch(e){ showAuthErr("Error inesperado. Intentá de nuevo."); }
}
function showAuthErr(msg){
  var err=document.getElementById("lg_err"); if(err){ err.textContent=msg; err.style.display="block"; }
  var btn=document.getElementById("lg_go"); if(btn){ btn.disabled=false; btn.textContent=authMode==="login"?"Entrar":authMode==="register"?"Crear cuenta":"Enviar link"; }
}

/* ───── shell ───── */
function shell(content){
  function nav(id,label){ return '<a class="'+(state.page===id?"on":"")+'" data-act="page" data-arg="'+id+'">'+label+'</a>'; }
  return '<div class="topbar"><button class="burger" data-act="toggleside" aria-label="Menú">☰</button><span class="tb-lg">LUA</span></div>'+
    '<div class="shell"><div class="backdrop" data-act="closeside"></div><aside class="side" id="side">'+
    '<div class="lg">LUA</div>'+
    nav("agenda","Agenda")+nav("caja","Caja")+nav("servicios","Servicios")+nav("imagenes","Imágenes")+nav("dashboard","Ventas")+nav("clientes","Clientes")+
    '<button class="out" data-act="logout" style="background:none;border:none;text-align:left">Salir</button>'+
    '</aside><main class="main">'+content+'</main></div>';
}
function go(page){ state.page=page;
  if(page==="agenda") loadAgenda();
  else if(page==="caja") loadCaja();
  else if(page==="servicios") loadServicios();
  else if(page==="imagenes") loadImagenes();
  else if(page==="dashboard") loadDashboard();
  else if(page==="clientes") loadClientes();
}

/* ───── AGENDA ───── */
async function loadAgenda(){
  app.innerHTML = shell('<div class="head"><h2>Cargando…</h2></div>');
  var r = await sb.from("slots").select("*").eq("date",state.date).order("time");
  state.slots = r.data||[];
  renderAgenda();
}
function slotByTime(t){ for(var i=0;i<state.slots.length;i++){ if(state.slots[i].time===t) return state.slots[i]; } return null; }
function renderAgenda(){
  var times=slotTimes(), counts={available:0,pending:0,reserved:0,attended:0};
  var cells=times.map(function(t){
    var s=slotByTime(t), st=s?s.status:"closed"; if(counts[st]!=null) counts[st]++;
    var conf=STATES[st]||STATES.closed;
    var who=s&&(s.customer_name)?('<div class="who">'+esc(s.customer_name)+(s.note?(' · '+esc(s.note)):'')+'</div>'):'<div class="who"></div>';
    var btns="";
    if(st==="closed") btns='<button class="primary" data-act="open" data-t="'+t+'">Abrir</button>';
    else if(st==="available") btns='<button data-act="close" data-t="'+t+'">Cerrar</button>';
    else if(st==="pending") btns='<button class="primary" data-act="confirm" data-id="'+s.id+'">Confirmar</button><button data-act="cancel" data-id="'+s.id+'">Liberar</button>';
    else if(st==="reserved") btns='<button class="primary" data-act="cobro" data-id="'+s.id+'">Cobrar</button><button data-act="cancel" data-id="'+s.id+'">Liberar</button>';
    else if(st==="attended") btns='<button data-act="cobro" data-id="'+s.id+'">+ Cobro</button>';
    return '<div class="slot s-'+st+'"><div class="t">'+t+'</div><span class="chip" style="background:'+conf.color+'">'+conf.label+'</span>'+who+'<div class="row">'+btns+'</div></div>';
  }).join("");
  var legend=["available","pending","reserved","attended"].map(function(k){return '<span><i style="background:'+STATES[k].color+'"></i>'+STATES[k].label+'</span>';}).join("");
  app.innerHTML = shell(
    '<div class="head"><div><div class="label">Panel · Horarios</div><h2>Agenda</h2></div></div>'+
    '<div class="datenav"><button class="navbtn" data-act="prev">‹</button>'+
    '<input type="date" id="ag_date" value="'+state.date+'" />'+
    '<button class="navbtn" data-act="next">›</button>'+
    '<span style="margin-left:6px;color:var(--inkSoft);text-transform:capitalize">'+fdate(state.date)+'</span></div>'+
    '<div class="summary">'+counts.available+' disponibles · '+counts.pending+' en proceso · '+counts.reserved+' reservados · '+counts.attended+' atendidos</div>'+
    '<div class="tools"><button data-act="allopen">Abrir jornada</button><button data-act="allclose">Cerrar jornada</button></div>'+
    '<div class="legend">'+legend+'</div>'+
    '<div class="grid">'+cells+'</div>'
  );
}
function shiftDate(n){ var d=new Date(state.date+"T00:00:00"); d.setDate(d.getDate()+n); state.date=d.toISOString().slice(0,10); loadAgenda(); }

async function slotOpen(t){ await sb.from("slots").upsert({date:state.date,time:t,status:"available",client_id:null,service_id:null,customer_name:null,customer_phone:null,note:null},{onConflict:"date,time"}); loadAgenda(); }
async function slotClose(t){ await sb.from("slots").delete().eq("date",state.date).eq("time",t).eq("status","available"); loadAgenda(); }
async function slotConfirm(id){ await sb.from("slots").update({status:"reserved",updated_at:new Date().toISOString()}).eq("id",id); loadAgenda(); }
async function slotCancel(id){ await sb.from("slots").update({status:"available",client_id:null,service_id:null,customer_name:null,customer_phone:null,note:null,updated_at:new Date().toISOString()}).eq("id",id); loadAgenda(); }
async function jornadaOpen(){
  var rows=slotTimes().map(function(t){ return {date:state.date,time:t,status:"available"}; });
  var existing={}; state.slots.forEach(function(s){ existing[s.time]=1; });
  rows=rows.filter(function(r){ return !existing[r.time]; });
  if(rows.length){ await sb.from("slots").insert(rows); }
  loadAgenda();
}
async function jornadaClose(){ await sb.from("slots").delete().eq("date",state.date).eq("status","available"); loadAgenda(); }

/* ───── COBRO · maestro-detalle ───── */
function openCobro(id){
  var s=slotByTime ? state.slots.filter(function(x){return x.id===id;})[0] : null;
  var items=[];
  if(s&&s.service_id){ var sv=state.services.filter(function(x){return x.id===s.service_id;})[0]; if(sv) items.push({service_id:sv.id,description:sv.name,quantity:1,unit_price:Number(sv.price)}); }
  if(!items.length) items.push({service_id:"",description:"",quantity:1,unit_price:0});
  state.cobro={slotId:id, clientId:(s?s.client_id:null), name:(s?s.customer_name:""), method:"efectivo", notes:"", items:items};
  renderCobro();
}
function cobroTotal(){ return state.cobro.items.reduce(function(a,it){ return a + (Number(it.quantity)||0)*(Number(it.unit_price)||0); },0); }
function renderCobro(){
  var c=state.cobro;
  var svcOpts=function(sel){ return '<option value="">— servicio —</option>'+state.services.map(function(s){return '<option value="'+s.id+'"'+(sel===s.id?" selected":"")+'>'+esc(s.name)+'</option>';}).join(""); };
  var rows=c.items.map(function(it,i){
    return '<div class="ir">'+
      '<select class="ci-svc" data-i="'+i+'">'+svcOpts(it.service_id)+'</select>'+
      '<input class="ci-qty" data-i="'+i+'" type="number" min="1" value="'+(it.quantity||1)+'" />'+
      '<input class="ci-price" data-i="'+i+'" type="number" min="0" value="'+(it.unit_price||0)+'" />'+
      '<div class="sub" id="sub-'+i+'">'+money((it.quantity||0)*(it.unit_price||0))+'</div>'+
      '<button class="del" data-act="delitem" data-i="'+i+'">×</button>'+
    '</div>';
  }).join("");
  var modal=
    '<div class="ovl" data-act="closecobro"><div class="modal" data-stop>'+
    '<div class="top"><div><div class="label">Registrar cobro</div><h3>'+(c.name?esc(c.name):"Venta")+'</h3></div>'+
    '<button class="x" data-act="closecobro">×</button></div>'+
    '<div class="items"><div class="ih"><span>Servicio</span><span>Cant.</span><span>P. unit</span><span style="text-align:right">Subtotal</span><span></span></div>'+rows+'</div>'+
    '<button class="add" data-act="additem">+ Agregar ítem</button>'+
    '<div class="total"><div><div class="label">Total</div></div><div class="big" id="cobroTotal">'+money(cobroTotal())+'</div></div>'+
    '<div class="fld"><label>Método de pago</label><select id="co_method"><option value="efectivo">Efectivo</option><option value="qr">QR</option><option value="tarjeta">Tarjeta</option><option value="transferencia">Transferencia</option></select></div>'+
    '<div class="fld"><label>Nota (opcional)</label><input id="co_notes" placeholder="Observación" /></div>'+
    '<button class="btn" id="co_save" style="width:100%">Registrar venta</button>'+
    '</div></div>';
  /* re-render solo del modal encima del shell actual */
  var holder=document.getElementById("cobroHolder");
  if(!holder){ holder=document.createElement("div"); holder.id="cobroHolder"; document.body.appendChild(holder); }
  holder.innerHTML=modal;
}
function closeCobro(){ state.cobro=null; var h=document.getElementById("cobroHolder"); if(h) h.innerHTML=""; }
function syncCobroFromDOM(){
  if(!state.cobro) return;
  document.querySelectorAll(".ir").forEach(function(row,i){
    var svc=row.querySelector(".ci-svc"), qty=row.querySelector(".ci-qty"), price=row.querySelector(".ci-price");
    if(state.cobro.items[i]){
      state.cobro.items[i].service_id=svc.value;
      state.cobro.items[i].description=svc.options[svc.selectedIndex]?svc.options[svc.selectedIndex].text:"";
      state.cobro.items[i].quantity=Number(qty.value)||1;
      state.cobro.items[i].unit_price=Number(price.value)||0;
    }
  });
}
function recalcCobro(){
  state.cobro.items.forEach(function(it,i){ var el=document.getElementById("sub-"+i); if(el) el.textContent=money((it.quantity||0)*(it.unit_price||0)); });
  var tt=document.getElementById("cobroTotal"); if(tt) tt.textContent=money(cobroTotal());
}
async function saveCobro(){
  syncCobroFromDOM();
  var c=state.cobro;
  var method=document.getElementById("co_method").value;
  var notes=document.getElementById("co_notes").value||"";
  var items=c.items.filter(function(it){ return (Number(it.unit_price)||0)>0 || it.service_id; });
  if(!items.length){ toast("Agregá al menos un ítem"); return; }
  var payload=items.map(function(it){ return {service_id:it.service_id||null, description:it.description||"Servicio", quantity:Number(it.quantity)||1, unit_price:Number(it.unit_price)||0}; });
  document.getElementById("co_save").disabled=true;
  var r=await sb.rpc("register_sale",{p_slot_id:c.slotId,p_client_id:c.clientId,p_method:method,p_notes:notes,p_items:payload});
  if(r.error){ toast("Error: "+r.error.message); document.getElementById("co_save").disabled=false; return; }
  closeCobro(); toast("Venta registrada ✓"); loadAgenda();
}

/* ───── DASHBOARD ───── */
async function loadDashboard(){
  app.innerHTML = shell('<div class="head"><h2>Cargando…</h2></div>');
  var since=new Date(); since.setDate(since.getDate()-30); var sinceISO=since.toISOString();
  var sales=[]; var slotsToday=[];
  try{ var r=await sb.from("sales").select("total,sale_date,payment_method,sale_items(description,quantity)").gte("sale_date",sinceISO).order("sale_date",{ascending:false}); sales=r.data||[]; }catch(e){}
  try{ var r2=await sb.from("slots").select("status").eq("date",todayISO()); slotsToday=r2.data||[]; }catch(e){}
  renderDashboard(sales, slotsToday);
}
function renderDashboard(sales, slotsToday){
  var today=todayISO();
  var todaySales=sales.filter(function(s){ return (s.sale_date||"").slice(0,10)===today; });
  var incomeToday=todaySales.reduce(function(a,b){return a+Number(b.total||0);},0);
  var pend=slotsToday.filter(function(s){return s.status==="pending";}).length;
  var resv=slotsToday.filter(function(s){return s.status==="reserved";}).length;
  var att=slotsToday.filter(function(s){return s.status==="attended";}).length;

  /* ventas últimos 7 días */
  var days=[]; for(var i=6;i>=0;i--){ var d=new Date(); d.setDate(d.getDate()-i); days.push(d.toISOString().slice(0,10)); }
  var byDay=days.map(function(iso){ return {iso:iso,lbl:new Date(iso+"T00:00:00").toLocaleDateString("es-BO",{weekday:"short"}),total:sales.filter(function(s){return (s.sale_date||"").slice(0,10)===iso;}).reduce(function(a,b){return a+Number(b.total||0);},0)}; });
  var max=Math.max(1,Math.max.apply(null,byDay.map(function(d){return d.total;})));
  var week=byDay.reduce(function(a,b){return a+b.total;},0);

  /* top servicios (del detalle) */
  var cnt={}; sales.forEach(function(s){ (s.sale_items||[]).forEach(function(it){ cnt[it.description]=(cnt[it.description]||0)+(it.quantity||0); }); });
  var top=Object.keys(cnt).map(function(k){return [k,cnt[k]];}).sort(function(a,b){return b[1]-a[1];}).slice(0,6);

  var chart='<div class="chart">'+byDay.map(function(d){ var h=(d.total/max)*100; return '<div class="bw"><div class="bar'+(d.iso===today?" today":"")+'" style="height:'+h+'%" title="'+money(d.total)+'"></div><div class="lbl">'+d.lbl+'</div></div>'; }).join("")+'</div>';

  var recent='<div class="rank">'+(sales.slice(0,8).map(function(s){ return '<div class="r"><span>'+new Date(s.sale_date).toLocaleDateString("es-BO",{day:"numeric",month:"short"})+' · '+(s.payment_method||"")+'</span><span style="font-family:var(--display);color:var(--brown)">'+money(s.total)+'</span></div>'; }).join("")||'<div style="color:var(--inkSoft);font-size:13px;padding:6px 0">Sin ventas aún.</div>')+'</div>';

  var topHtml='<div class="rank">'+(top.map(function(r,i){ return '<div class="r"><span><b style="color:var(--clay,#8A5A2B);margin-right:8px">'+(i+1)+'</b>'+esc(r[0])+'</span><span style="color:var(--inkSoft)">'+r[1]+'</span></div>'; }).join("")||'<div style="color:var(--inkSoft);font-size:13px;padding:6px 0">Sin datos.</div>')+'</div>';

  app.innerHTML = shell(
    '<div class="head"><div><div class="label">Resumen</div><h2>Ventas</h2></div></div>'+
    '<div class="kpis">'+
      '<div class="kpi"><div class="k">Ingresos hoy</div><div class="v">'+money(incomeToday)+'</div></div>'+
      '<div class="kpi"><div class="k">Ventas (semana)</div><div class="v">'+money(week)+'</div></div>'+
      '<div class="kpi"><div class="k">Pendientes hoy</div><div class="v">'+pend+'</div></div>'+
      '<div class="kpi"><div class="k">Reservados / atendidos</div><div class="v">'+resv+' / '+att+'</div></div>'+
    '</div>'+
    '<div class="panel"><div class="label" style="margin-bottom:10px">Ventas últimos 7 días</div>'+chart+'</div>'+
    '<div class="grid-2">'+
      '<div class="panel"><div class="label" style="margin-bottom:8px">Servicios más vendidos</div>'+topHtml+'</div>'+
      '<div class="panel"><div class="label" style="margin-bottom:8px">Últimas ventas</div>'+recent+'</div>'+
    '</div>'
  );
}

/* ───── SERVICIOS (catálogo / producto-servicio) ───── */
var CATS=["ducha","pestanas","manicura","capilar","corporal","depilacion"];
function catLabel(c){ var m={ducha:"Ducha solar",pestanas:"Pestañas / Cejas",manicura:"Manicura",capilar:"Capilar",corporal:"Corporal",depilacion:"Depilación"}; return m[c]||c; }
async function loadServicios(){
  app.innerHTML = shell('<div class="head"><h2>Cargando…</h2></div>');
  var r=await sb.from("services").select("*").order("category").order("name");
  state.services=r.data||[];
  renderServicios();
}
function renderServicios(){
  var rows=state.services.map(function(s){
    return '<div class="svc-row">'+
      '<div class="svc-main"><div class="svc-name">'+esc(s.name)+(s.active?'':'<span class="svc-off">oculto</span>')+'</div>'+
        '<div class="svc-meta">'+esc(catLabel(s.category))+' · '+s.duration_min+' min'+(s.sessions_count>1?(' · '+s.sessions_count+' sesiones'):'')+(s.description?(' · '+esc(s.description)):'')+'</div></div>'+

      '<div class="svc-acts">'+
        '<button data-act="svc-toggle" data-id="'+s.id+'">'+(s.active?'Ocultar':'Mostrar')+'</button>'+

        '<button class="danger" data-act="svc-del" data-id="'+s.id+'">Eliminar</button>'+
      '</div></div>';
  }).join("");
  app.innerHTML = shell(
    '<div class="head"><div><div class="label">Catálogo</div><h2>Servicios</h2></div>'+
    '<button class="btn" data-act="svc-new">+ Nuevo servicio</button></div>'+
    '<p style="color:var(--inkSoft);font-size:13px;margin:-6px 0 14px">Los servicios marcados como visibles aparecen en el portal del cliente.</p>'+
    '<div class="panel" style="padding:0">'+(rows||'<div style="padding:18px;color:var(--inkSoft)">Sin servicios. Creá el primero.</div>')+'</div>'

function openSvc(id){
  var base={name:"",category:"ducha",description:"",duration_min:30,price:0,sessions_count:1,active:true};
  var s=id?state.services.filter(function(x){return x.id===id;})[0]:base;

  renderSvcModal();
}
function renderSvcModal(){
  var s=state.svcEdit;
  var catOpts=CATS.map(function(c){return '<option value="'+c+'"'+(s.category===c?" selected":"")+'>'+catLabel(c)+'</option>';}).join("");
  var modal='<div class="ovl" data-act="svc-close"><div class="modal" data-stop style="width:480px">'+
    '<div class="top"><div><div class="label">'+(s.id?"Editar":"Nuevo")+' servicio</div><h3>'+(s.id?esc(s.name||"Servicio"):"Servicio")+'</h3></div><button class="x" data-act="svc-close">×</button></div>'+
    '<div class="fld"><label>Nombre</label><input id="sv_name" value="'+esc(s.name||"")+'" placeholder="Ej: Lifting de pestañas"/></div>'+
    '<div class="grid-2">'+
      '<div class="fld"><label>Categoría</label><select id="sv_cat">'+catOpts+'</select></div>'+
      '<div class="fld"><label>Precio (Bs)</label><input id="sv_price" type="number" min="0" value="'+(s.price||0)+'"/></div>'+
    '</div>'+
    '<div class="grid-2">'+
      '<div class="fld"><label>Duración (min)</label><input id="sv_dur" type="number" min="5" step="5" value="'+(s.duration_min||30)+'"/></div>'+
      '<div class="fld"><label>Sesiones (1 = individual)</label><input id="sv_sess" type="number" min="1" value="'+(s.sessions_count||1)+'"/></div>'+
    '</div>'+
    '<div class="fld"><label>Detalle / descripción</label><input id="sv_desc" value="'+esc(s.description||"")+'" placeholder="Texto visible para el cliente"/></div>'+
    '<label class="sw"><input type="checkbox" id="sv_active" '+(s.active?"checked":"")+'/> <span>Mostrar en el portal del cliente</span></label>'+
    '<button class="btn" id="sv_save" style="width:100%;margin-top:16px">Guardar</button>'+
    '</div></div>';
  var h=document.getElementById("svcHolder"); if(!h){ h=document.createElement("div"); h.id="svcHolder"; document.body.appendChild(h); }
  h.innerHTML=modal;
  var nm=document.getElementById("sv_name"); if(nm) nm.focus();
}
function closeSvc(){ state.svcEdit=null; var h=document.getElementById("svcHolder"); if(h) h.innerHTML=""; }
async function saveSvc(){
  var payload={
    name:(document.getElementById("sv_name").value||"").trim(),
    category:document.getElementById("sv_cat").value,
    price:Number(document.getElementById("sv_price").value)||0,
    duration_min:Number(document.getElementById("sv_dur").value)||30,
    sessions_count:Number(document.getElementById("sv_sess").value)||1,
    description:(document.getElementById("sv_desc").value||"").trim(),
    active:document.getElementById("sv_active").checked
  };
  if(!payload.name){ toast("Poné un nombre"); return; }
  document.getElementById("sv_save").disabled=true;
  var r = state.svcEdit.id
    ? await sb.from("services").update(payload).eq("id",state.svcEdit.id)
    : await sb.from("services").insert(payload);
  if(r.error){ toast("Error: "+r.error.message); document.getElementById("sv_save").disabled=false; return; }
  closeSvc(); toast("Servicio guardado ✓"); loadServicios();
}
async function toggleSvc(id){
  var s=state.services.filter(function(x){return x.id===id;})[0]; if(!s) return;
  await sb.from("services").update({active:!s.active}).eq("id",id); loadServicios();
}
async function delSvc(id){
  if(!confirm("¿Eliminar este servicio? Si ya tiene ventas registradas, mejor ocultalo.")) return;
  var r=await sb.from("services").delete().eq("id",id);
  if(r.error){ toast("No se pudo eliminar (tiene historial). Mejor ocultalo."); return; }
  toast("Servicio eliminado"); loadServicios();
}

function cajaTotal(){ return state.caja.items.reduce(function(a,it){return a+(Number(it.quantity)||0)*(Number(it.unit_price)||0);},0); }
function renderCaja(){
  var c=state.caja;
  var svcOpts=function(sel){ return '<option value="">— servicio —</option>'+state.services.map(function(s){return '<option value="'+s.id+'"'+(sel===s.id?" selected":"")+'>'+esc(s.name)+'</option>';}).join(""); };
  var rows=c.items.map(function(it,i){

      '<select class="cj-svc" data-i="'+i+'">'+svcOpts(it.service_id)+'</select>'+
      '<input class="cj-qty" data-i="'+i+'" type="number" min="1" value="'+(it.quantity||1)+'"/>'+
      '<input class="cj-price" data-i="'+i+'" type="number" min="0" value="'+(it.unit_price||0)+'"/>'+
      '<div class="sub" id="cjsub-'+i+'">'+money((it.quantity||0)*(it.unit_price||0))+'</div>'+
      '<button class="del" data-act="cj-delitem" data-i="'+i+'">×</button>'+
    '</div>';
  }).join("");
  var clientBlock;
  if(c.client){
    clientBlock='<div class="cj-client"><div><b style="color:var(--brown)">'+esc(c.client.full_name)+'</b><span style="color:var(--inkSoft);margin-left:8px">'+esc(c.client.phone||"")+'</span></div>'+
      '<button data-act="cj-clearclient">Cambiar</button></div>';
  } else {
    clientBlock=
      '<div class="fld"><label>Buscar cliente (nombre o teléfono)</label><input id="cj_search" placeholder="Escribí para buscar…" autocomplete="off"/></div>'+
      '<div id="cj_results" class="cj-results"></div>'+
      '<div class="cj-or">— o cliente nuevo —</div>'+
      '<div class="grid-2"><div class="fld"><label>Nombre</label><input id="cj_nname" placeholder="Nombre y apellido"/></div>'+
      '<div class="fld"><label>WhatsApp</label><input id="cj_nphone" placeholder="Teléfono"/></div></div>';
  }
  app.innerHTML = shell(
    '<div class="head"><div><div class="label">Registrar venta</div><h2>Caja</h2></div></div>'+
    '<div class="grid-2" style="align-items:start">'+
      '<div class="panel"><div class="label" style="margin-bottom:10px">Cliente</div>'+clientBlock+'</div>'+
      '<div class="panel"><div class="label" style="margin-bottom:10px">Pago</div>'+
        '<div class="fld"><label>Método</label><select id="cj_method"><option value="efectivo">Efectivo</option><option value="qr">QR</option><option value="tarjeta">Tarjeta</option><option value="transferencia">Transferencia</option></select></div>'+
        '<div class="fld"><label>Nota (opcional)</label><input id="cj_notes" placeholder="Observación"/></div>'+
      '</div>'+
    '</div>'+
    '<div class="panel"><div class="label" style="margin-bottom:10px">Servicios</div>'+
      '<div class="items"><div class="ih"><span>Servicio</span><span>Cant.</span><span>P. unit</span><span style="text-align:right">Subtotal</span><span></span></div>'+rows+'</div>'+
      '<button class="add" data-act="cj-additem">+ Agregar servicio</button>'+
      '<div class="total"><div><div class="label">Total</div></div><div class="big" id="cajaTotal">'+money(cajaTotal())+'</div></div>'+
      '<button class="btn" id="cj_save" style="width:100%">Registrar venta</button>'+
    '</div>'
  );
  var mm=document.getElementById("cj_method"); if(mm) mm.value=c.method;
  var nn=document.getElementById("cj_notes"); if(nn) nn.value=c.notes;
}
function syncCajaFromDOM(){
  if(!state.caja) return;
  document.querySelectorAll(".items .ir").forEach(function(row,i){
    var svc=row.querySelector(".cj-svc"); if(!svc||!state.caja.items[i]) return;
    var qty=row.querySelector(".cj-qty"), price=row.querySelector(".cj-price");
    state.caja.items[i].service_id=svc.value;
    state.caja.items[i].description=svc.options[svc.selectedIndex]?svc.options[svc.selectedIndex].text:"";
    state.caja.items[i].quantity=Number(qty.value)||1;
    state.caja.items[i].unit_price=Number(price.value)||0;
  });
  var mm=document.getElementById("cj_method"); if(mm) state.caja.method=mm.value;
  var nn=document.getElementById("cj_notes"); if(nn) state.caja.notes=nn.value;
}
function recalcCaja(){
  state.caja.items.forEach(function(it,i){ var el=document.getElementById("cjsub-"+i); if(el) el.textContent=money((it.quantity||0)*(it.unit_price||0)); });
  var tt=document.getElementById("cajaTotal"); if(tt) tt.textContent=money(cajaTotal());
}
var cjSearchT=null;
function cjSearch(q){
  var box=document.getElementById("cj_results"); if(!box) return;
  q=(q||"").replace(/[,%()]/g,"").trim();
  if(q.length<2){ box.innerHTML=""; return; }
  clearTimeout(cjSearchT);
  cjSearchT=setTimeout(async function(){
    var r=await sb.from("clients").select("*").or("full_name.ilike.%"+q+"%,phone.ilike.%"+q+"%").limit(8);
    var list=r.data||[]; state.caja._results=list;
    box.innerHTML=list.length
      ? list.map(function(c){return '<button class="cj-result" data-act="cj-pickclient" data-id="'+c.id+'">'+esc(c.full_name)+' <span>'+esc(c.phone||"")+'</span></button>';}).join("")
      : '<div class="cj-empty">Sin resultados — podés crearlo abajo.</div>';
  },250);
}
function pickClient(id){ var c=(state.caja._results||[]).filter(function(x){return x.id===id;})[0]; if(c){ state.caja.client=c; renderCaja(); } }
function clearClient(){ state.caja.client=null; renderCaja(); }
async function saveCaja(){
  syncCajaFromDOM();
  var c=state.caja;
  var items=c.items.filter(function(it){ return it.service_id || (Number(it.unit_price)||0)>0; });
  if(!items.length){ toast("Agregá al menos un servicio"); return; }
  document.getElementById("cj_save").disabled=true;
  var clientId=null;
  try{
    if(c.client){ clientId=c.client.id; }
    else {
      var nm=(document.getElementById("cj_nname")?document.getElementById("cj_nname").value:"").trim();
      var ph=(document.getElementById("cj_nphone")?document.getElementById("cj_nphone").value:"").trim();
      if(nm||ph){
        if(ph){ var f=await sb.from("clients").select("id").eq("phone",ph).maybeSingle(); if(f.data) clientId=f.data.id; }
        if(!clientId){
          var ins=await sb.from("clients").insert({full_name:nm||"Cliente",phone:ph||("s/d-"+Date.now())}).select("id").single();
          if(ins.error){ toast("Error con el cliente: "+ins.error.message); document.getElementById("cj_save").disabled=false; return; }
          clientId=ins.data.id;
        }
      }
    }
  }catch(e){ toast("Error con el cliente"); document.getElementById("cj_save").disabled=false; return; }
  var payload=items.map(function(it){ return {service_id:it.service_id||null, description:it.description||"Servicio", quantity:Number(it.quantity)||1, unit_price:Number(it.unit_price)||0}; });
  var r=await sb.rpc("register_sale",{p_slot_id:null,p_client_id:clientId,p_method:c.method,p_notes:c.notes,p_items:payload});
  if(r.error){ toast("Error: "+r.error.message); document.getElementById("cj_save").disabled=false; return; }
  toast("Venta registrada ✓"); loadCaja();
}

/* ───── IMÁGENES DEL SITIO (Storage) ───── */
var SITE_IMGS=[
  {key:"ducha", label:"Promo · Ducha solar (10 sesiones)"},
  {key:"bano",  label:"Promo · Baño de Luna 2x1"},
  {key:"serv1", label:"Servicios · Pestañas, Manicura, Capilar"},
  {key:"serv2", label:"Servicios · Corporal y Depilación"}
];
async function loadImagenes(){
  app.innerHTML = shell('<div class="head"><h2>Cargando…</h2></div>');
  var map={};
  try{ var r=await sb.from("site_images").select("key,url"); (r.data||[]).forEach(function(x){ map[x.key]=x.url; }); }catch(e){}
  state.siteImages=map;
  renderImagenes();
}
function renderImagenes(){
  var cards=SITE_IMGS.map(function(s){
    var url=state.siteImages[s.key];
    var prev=url?'<img src="'+esc(url)+'" class="img-prev"/>':'<div class="img-empty">Se muestra la imagen del diseño original.<br><span>Subí una para reemplazarla.</span></div>';
    return '<div class="panel"><div class="label" style="margin-bottom:8px">'+esc(s.label)+'</div>'+prev+
      '<input type="file" accept="image/*" class="img-file" id="imgf-'+s.key+'" data-key="'+s.key+'" style="display:none"/>'+
      '<button class="btn" style="width:100%;margin-top:10px" data-act="img-pick" data-key="'+s.key+'">Cambiar imagen</button>'+
      (url?'<button data-act="img-reset" data-key="'+s.key+'" style="width:100%;margin-top:6px;background:none;border:1px solid var(--line);border-radius:10px;padding:9px;color:var(--brown);font-family:var(--ui)">Quitar (volver al diseño)</button>':'')+
      '</div>';
  }).join("");
  app.innerHTML = shell(
    '<div class="head"><div><div class="label">Sitio</div><h2>Imágenes</h2></div></div>'+
    '<p style="color:var(--inkSoft);font-size:13px;margin:-6px 0 14px">Subí una imagen y se actualiza al instante en la web del cliente. Ideal para cambiar el flyer de promoción.</p>'+
    '<div class="grid-2">'+cards+'</div>'
  );
}
async function uploadSiteImage(key, file){
  if(!file) return;
  if(file.size>5*1024*1024){ toast("La imagen es muy pesada (máx 5 MB)"); return; }
  toast("Subiendo imagen…");
  var ext=((file.name.split(".").pop()||"jpg").toLowerCase().replace(/[^a-z0-9]/g,""))||"jpg";
  var path="site/"+key+"-"+Date.now()+"."+ext;
  var up=await sb.storage.from("media").upload(path,file,{cacheControl:"3600",upsert:true,contentType:file.type||"image/jpeg"});
  if(up.error){ toast("Error al subir: "+up.error.message); return; }
  var url=sb.storage.from("media").getPublicUrl(path).data.publicUrl;
  var r=await sb.from("site_images").upsert({key:key,url:url,updated_at:new Date().toISOString()});
  if(r.error){ toast("Error al guardar: "+r.error.message); return; }
  toast("Imagen actualizada ✓"); loadImagenes();
}
async function resetSiteImage(key){
  await sb.from("site_images").upsert({key:key,url:null,updated_at:new Date().toISOString()});
  toast("Volvió a la imagen del diseño"); loadImagenes();
}

/* ───── eventos (delegación) ───── */
app.addEventListener("click", function(e){
  var el=e.target.closest("[data-act]"); if(!el) return;
  var a=el.dataset.act, t=el.dataset.t, id=el.dataset.id;
  if(a==="page") go(el.dataset.arg);
  else if(a==="toggleside"){ var sd=document.getElementById("side"), bd=document.querySelector(".backdrop"); if(sd)sd.classList.toggle("open"); if(bd)bd.classList.toggle("open"); }
  else if(a==="closeside"){ var s2=document.getElementById("side"), b2=document.querySelector(".backdrop"); if(s2)s2.classList.remove("open"); if(b2)b2.classList.remove("open"); }
  else if(a==="logout") sb.auth.signOut();
  else if(a==="prev") shiftDate(-1);
  else if(a==="next") shiftDate(1);
  else if(a==="open") slotOpen(t);
  else if(a==="close") slotClose(t);
  else if(a==="confirm") slotConfirm(id);
  else if(a==="cancel") slotCancel(id);
  else if(a==="cobro") openCobro(id);
  else if(a==="allopen") jornadaOpen();
  else if(a==="allclose") jornadaClose();
  else if(a==="svc-new") openSvc(null);
  else if(a==="svc-edit") openSvc(id);
  else if(a==="svc-toggle") toggleSvc(id);
  else if(a==="svc-del") delSvc(id);
  else if(a==="cj-additem"){ syncCajaFromDOM(); state.caja.items.push({service_id:"",description:"",quantity:1,unit_price:0}); renderCaja(); }
  else if(a==="cj-delitem"){ syncCajaFromDOM(); state.caja.items.splice(Number(el.dataset.i),1); if(!state.caja.items.length) state.caja.items.push({service_id:"",description:"",quantity:1,unit_price:0}); renderCaja(); }
  else if(a==="cj-clearclient") clearClient();
  else if(a==="cj-pickclient") pickClient(id);
  else if(a==="img-pick"){ var f=document.getElementById("imgf-"+el.dataset.key); if(f) f.click(); }
  else if(a==="img-reset") resetSiteImage(el.dataset.key);
});
app.addEventListener("keydown", function(e){ if(e.key==="Enter" && (e.target.id==="lg_pass"||e.target.id==="lg_email")) doAuth(); });

/* eventos del modal de cobro (en body, fuera de #app) */
document.body.addEventListener("click", function(e){
  var el=e.target.closest("[data-act]"); if(!el) return;
  var a=el.dataset.act;
  if(a==="closecobro"){ if(e.target.closest("[data-stop]") && !e.target.matches('[data-act="closecobro"]')) return; closeCobro(); }
  else if(a==="additem"){ syncCobroFromDOM(); state.cobro.items.push({service_id:"",description:"",quantity:1,unit_price:0}); renderCobro(); }
  else if(a==="delitem"){ syncCobroFromDOM(); state.cobro.items.splice(Number(el.dataset.i),1); if(!state.cobro.items.length) state.cobro.items.push({service_id:"",description:"",quantity:1,unit_price:0}); renderCobro(); }
  else if(a==="svc-close"){ if(e.target.closest("[data-stop]") && !e.target.matches('[data-act="svc-close"]')) return; closeSvc(); }
});
document.body.addEventListener("click", function(e){
  if(e.target.id==="co_save") saveCobro();
  else if(e.target.id==="cj_save") saveCaja();
  else if(e.target.id==="sv_save") saveSvc();
});
document.body.addEventListener("change", function(e){
  if(e.target.classList && e.target.classList.contains("ci-svc")){
    var i=Number(e.target.dataset.i), sv=state.services.filter(function(x){return x.id===e.target.value;})[0];
    if(sv){ var row=e.target.closest(".ir"); var pr=row.querySelector(".ci-price"); if(pr) pr.value=Number(sv.price); }
    syncCobroFromDOM(); recalcCobro();
  }
  if(e.target.classList && e.target.classList.contains("cj-svc")){
    var sv2=state.services.filter(function(x){return x.id===e.target.value;})[0];
    if(sv2){ var row2=e.target.closest(".ir"); var pr2=row2.querySelector(".cj-price"); if(pr2) pr2.value=Number(sv2.price); }
    syncCajaFromDOM(); recalcCaja();
  }
  if(e.target.id==="ag_date"){ state.date=e.target.value; loadAgenda(); }
});
document.body.addEventListener("change", function(e){
  if(e.target.classList && e.target.classList.contains("img-file") && e.target.files && e.target.files[0]){
    uploadSiteImage(e.target.dataset.key, e.target.files[0]);
  }
});
document.body.addEventListener("input", function(e){
  if(e.target.classList && (e.target.classList.contains("ci-qty")||e.target.classList.contains("ci-price"))){ syncCobroFromDOM(); recalcCobro(); }
  if(e.target.classList && (e.target.classList.contains("cj-qty")||e.target.classList.contains("cj-price"))){ syncCajaFromDOM(); recalcCaja(); }
  if(e.target.id==="cj_search") cjSearch(e.target.value);
});

init();
</script>
